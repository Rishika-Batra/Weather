<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skye — Weather</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1 class="logo">Skye</h1>
        <button id="theme-toggle" class="icon-btn" aria-label="Toggle Theme">
          <span class="theme-icon">☀️</span>
        </button>
      </div>
      
      <div id="sidebar-weather-card" class="weather-card">
        <div class="main-temp-wrapper">
          <span id="current-temp" class="temp-display">36</span>
          <span class="unit-toggle">°C / °F</span>
        </div>
        <div id="weather-icon-display" class="condition-icon">☁️</div>
        <p id="weather-condition" class="condition-text">Mist</p>
        <p class="feels-like">Feels like <span id="feels-like-temp">40°C</span></p>
        
        <hr class="divider">
        
        <div class="location-details">
          <p id="location-text" class="location-name">Lucknow, India</p>
          <p id="local-time-text" class="date-string">2026-06-10 21:51</p>
        </div>

        <div class="sun-phases">
          <div class="sun-item">
            <span class="sun-label">☀️ Sunrise</span>
            <span id="sunrise-time" class="sun-value">05:11 AM</span>
          </div>
          <div class="sun-item">
            <span class="sun-label">🌙 Sunset</span>
            <span id="sunset-time" class="sun-value">06:59 PM</span>
          </div>
        </div>
      </div>
    </aside>

    <main class="main-content">
      
      <header class="dashboard-header">
        <div class="tab-container">
          <button id="tab-today" class="tab-btn active">Today</button>
          <button id="tab-week" class="tab-btn">This week</button>
          <span id="live-badge" class="badge-live">● Live</span>
        </div>
      </header>

      <section id="hourly-forecast-view" class="forecast-view-panel">
        <h3 class="section-title">Today's Highlights</h3>
        
        <div class="highlights-grid">
          <div class="metrics-card">
            <div class="card-header"><span>WIND</span> <span class="icon">💨</span></div>
            <div class="metric-value"><span id="wind-speed">12</span> <span class="unit">km/h</span></div>
          </div>
          <div class="metrics-card">
            <div class="card-header"><span>HUMIDITY</span> <span class="icon">💧</span></div>
            <div class="metric-value"><span id="humidity-value">39</span> <span class="unit">%</span></div>
            <div class="progress-bar-container">
              <div id="humidity-bar" class="progress-fill" style="width: 39%;"></div>
            </div>
          </div>
          <div class="metrics-card">
            <div class="card-header"><span>UV INDEX</span> <span class="icon">☀️</span></div>
            <div class="metric-value"><span id="uv-index">0</span></div>
          </div>
          <div class="metrics-card">
            <div class="card-header"><span>PRESSURE</span> <span class="icon">⏲️</span></div>
            <div class="metric-value"><span id="pressure-value">998</span> <span class="unit">hPa</span></div>
          </div>
          <div class="metrics-card">
            <div class="card-header"><span>VISIBILITY</span> <span class="icon">👁️</span></div>
            <div class="metric-value"><span id="visibility-value">5</span> <span class="unit">km</span></div>
          </div>
          <div class="metrics-card">
            <div class="card-header"><span>CLOUD COVER</span> <span class="icon">☁️</span></div>
            <div class="metric-value"><span id="cloud-value">0</span> <span class="unit">%</span></div>
          </div>
        </div>

        <h3 class="section-title margin-top-lg">Hourly Forecast</h3>
        <div class="horizontal-scroll-container" id="hourly-cards-container">
          </div>
      </section>

      <section id="weekly-forecast-view" class="forecast-view-panel hidden">
        <h3 class="section-title">This Week's Forecast</h3>
        <div class="weekly-list-container" id="weekly-cards-container">
          </div>
      </section>

    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
